<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISO 27701 / SGPI | Curso ISO/IEC 27001</title>
<link rel="stylesheet" href="engine.css">
<style>
    .mapping-table th { background: var(--navy-light); }
    .rgpd-ref {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      color: #00695C;
      font-weight: 600;
      background: #E8FAF5;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .ctrl-27701 {
      font-size: 0.72rem;
      font-family: var(--font-mono);
      color: #006064;
      font-weight: 600;
    }
    .dpia-step {
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
      background: var(--white);
      border: 1px solid rgba(46,92,138,0.1);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      margin-bottom: 0.75rem;
    }
    .dpia-num {
      width: 30px; height: 30px;
      background: var(--navy);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }
  </style>
</head>
<body data-module="6">
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="badge">ISO/IEC 27001 · 27701</div>
      <h2>Implementador de<br>SGSI Certificado</h2>
      <p>Seguridad de la Información y Privacidad</p>
    </div>
    <div class="sidebar-progress">
      <div class="progress-label">Progreso del curso</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill"></div></div>
      <div class="progress-pct">Módulo 6 de 14</div>
    </div>
    <nav><ul id="sidebar-nav"></ul></nav>
  </aside>
  <div class="stage-wrap">
    <div class="deck-progress"><div class="deck-progress-fill" id="deckProgressFill"></div></div>
    <div class="stage" id="stage"></div>
    <div class="navbar">
      <button class="btn-nav secundario" id="btnPrev" onclick="Deck.goPrev()">← Anterior</button>
      <div class="dots" id="deckDots"></div>
      <button class="btn-nav" id="btnNext" onclick="Deck.goNext()">Siguiente →</button>
    </div>
    <div class="lock-msg" id="lockMsg"></div>
  </div>
</div>
<script src="jspdf.umd.min.js"></script>
<script src="scorm_api.js"></script>
<script src="engine.js"></script>
<script src="slides-modulo6.js"></script>
<script>Deck.boot(6, window.SLIDES);</script>
</body>
</html>
