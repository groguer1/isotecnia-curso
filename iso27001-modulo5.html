<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Declaración de Aplicabilidad | Curso ISO/IEC 27001</title>
<link rel="stylesheet" href="engine.css">
<style>
    .soa-builder {
      background: var(--navy);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      margin: 2.5rem 0;
    }
    .soa-row {
      display: grid;
      grid-template-columns: 70px 1fr 90px 110px 80px;
      gap: 8px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(168,200,232,0.06);
      font-size: 0.82rem;
    }
    .soa-row:last-child { border-bottom: none; }
    .soa-row.header {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-faint);
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(168,200,232,0.15);
    }
    .soa-ref { font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent-dark); font-weight: 600; }
    .soa-name { color: var(--ice); }
    .soa-toggle {
      display: flex;
      gap: 4px;
    }
    .soa-btn {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 100px;
      border: 1px solid rgba(168,200,232,0.2);
      background: transparent;
      color: var(--text-faint);
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .soa-btn.inc { background: rgba(0,200,150,0.15); border-color: var(--accent); color: var(--accent); }
    .soa-btn.exc { background: rgba(239,68,68,0.1); border-color: var(--danger); color: #FCA5A5; }
    .soa-status {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 100px;
      text-align: center;
    }
    .soa-status.imp { background: rgba(0,200,150,0.12); color: var(--accent); }
    .soa-status.par { background: rgba(245,158,11,0.12); color: var(--warn); }
    .soa-status.pen { background: rgba(168,200,232,0.08); color: var(--text-faint); }
    .soa-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .soa-stat {
      background: rgba(255,255,255,0.04);
      border-radius: var(--radius-md);
      padding: 1rem;
      text-align: center;
    }
    .soa-stat-num { font-size: 1.5rem; font-weight: 700; color: var(--white); line-height: 1; }
    .soa-stat-label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); margin-top: 4px; }
  </style>
</head>
<body data-module="5">
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="badge">ISO/IEC 27001 · 27701</div>
      <h2>Implementador de<br>SGSI Certificado</h2>
      <p>Seguridad de la Información y Privacidad</p>
    </div>
    <div class="sidebar-progress">
      <div class="progress-label">Progreso del curso</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill"></div></div>
      <div class="progress-pct">Módulo 5 de 14</div>
    </div>
    <nav><ul id="sidebar-nav"></ul></nav>
  </aside>
  <div class="stage-wrap">
    <div class="deck-progress"><div class="deck-progress-fill" id="deckProgressFill"></div></div>
    <div class="stage" id="stage"></div>
    <div class="navbar">
      <button class="btn-nav secundario" id="btnPrev" onclick="Deck.goPrev()">← Anterior</button>
      <div class="dots" id="deckDots"></div>
      <button class="btn-nav" id="btnNext" onclick="Deck.goNext()">Siguiente →</button>
    </div>
    <div class="lock-msg" id="lockMsg"></div>
  </div>
</div>
<script src="jspdf.umd.min.js"></script>
<script src="scorm_api.js"></script>
<script src="engine.js"></script>
<script src="slides-modulo5.js"></script>
<script>Deck.boot(5, window.SLIDES);</script>
</body>
</html>
